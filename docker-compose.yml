services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aifinance
      POSTGRES_USER: aifinance
      POSTGRES_PASSWORD: aifinance_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aifinance -d aifinance"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env.example
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate && gunicorn backend.wsgi:application -c gunicorn.conf.py"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000/api/
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
